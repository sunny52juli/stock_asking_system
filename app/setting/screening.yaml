# ================================================================================
# 策略配置文件 - 定义选股策略模板和系统配置
# ================================================================================
# 
# 使用说明：
# 1. 策略配置 - 添加你的选股策略，Agent会自动生成筛选脚本
# 2. 高级配置 - LLM、Harness、权限等系统底层配置（一般无需修改）
# ================================================================================

# 全局观察期 (交易日) - 用于所有策略生成、回测和指标计算
observation_days: 60

# ==================== 策略模板配置 =============================
strategies:
  跑赢大盘:
    query: |
      "找出低波动且跑赢大盘的股票"：
    strategy_num: 1                    # 生成几个不同版本

#  均线多头:
#     query: |
#       找出均线多头排列的股票：
#       1. 5日>10日>20日均线
#       2. 股价站上所有均线
#     strategy_num: 1
  #
  # 低估值蓝筹:
  #   query: |
  #     找出低估值蓝筹股：
  #     1. 市盈率<15
  #     2. 市净率<2
  #     3. 股息率>3%
  #   strategy_num: 1


# ==================== 高级配置（一般无需修改）=====================

# LLM 配置
llm:
  temperature: 0.7
  max_tokens: 4096

# 输出配置
output:
  strategies_dir: "${SCREENER_SCRIPTS_DIR:-./screening_scripts}"  # 策略脚本输出目录
  auto_save_script: true         # 是否自动保存生成的策略脚本（true=自动保存，false=询问用户）

# Agent约束框架（Harness）- 三大核心组件
harness:
  deep_thinking: True              # 是否启用深度思考模式（true=详细分析，false=快速响应）
  max_iterations: 2                # 最大迭代次数
  max_consecutive_errors: 2        # 最大连续错误次数
  max_execution_time: 300          # 最大执行时间 (秒)
  
  # ========== 1. Hooks 钩子系统 ==========
  # 在关键节点执行自定义验证脚本
  hooks:
    # 工具调用前验证（PreToolUse）
    PreToolUse:
      - matcher: "run_screening"   # 仅对 run_screening 工具生效
        hooks:
          - type: command
            command: "python .stock_asking/hooks/validate-strategy.py"
    
    # 工具调用后检查（PostToolUse）- 当前为空，可按需添加
    PostToolUse: []
    
    # Agent 会话结束时的质量门禁（Stop）
    Stop:
      - hooks:
          - type: command
            command: "python .stock_asking/hooks/quality-gate.py"

# ========== 2. Rules 规则引擎 ==========
# 规则文件位于 .stock_asking/rules/*.md
# 会自动加载并注入到 System Prompt 中约束 Agent 行为
# 当前已启用的规则：
#   - quality-criteria.md    : 结果质量评估标准
#   - expression-design.md   : 表达式设计规范
#   - data-quality.md        : 数据质量要求

# ========== 3. Permissions 权限控制 ==========
permissions:
  # 白名单模式：只允许列出的工具（支持通配符）
  allow:
    - "*"                      # 默认允许所有工具
  
  # 黑名单模式：禁止列出的工具（deny 优先级高于 allow）
  deny: []                     # 当前无禁止工具
  
  # 示例配置（取消注释以启用）：
  # allow:
  #   - "run_screening"
  #   - "get_stock_data"
  #   - "rolling_*"           # 允许所有 rolling 开头的工具
  #   - "rsi"
  #   - "macd"
  # deny:
  #   - "delete_*"            # 禁止所有删除操作
  #   - "execute_code"        # 禁止代码执行

# MCP服务配置
mcp: {}
