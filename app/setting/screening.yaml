# ================================================================================
# 策略配置文件 - 定义选股策略模板和系统配置
# ================================================================================
# 
# 使用说明：
# 1. 策略配置 - 添加你的选股策略，Agent会自动生成筛选脚本
# 2. 高级配置 - LLM、Harness、权限等系统底层配置（一般无需修改）
# ================================================================================

# 全局观察期 (交易日) - 用于所有策略生成、回测和指标计算
observation_days: 60

# ==================== 策略模板配置 =============================
strategies:
  放量突破:
    query: |
      找出最近放量突破的股票：
      1. 成交量较前期放大（至少 1.5 倍）
      2. 涨幅>3%
      3. 技术形态良好
    strategy_num: 1                    # 生成几个不同版本

  均线多头:
     query: |
       找出均线多头排列的股票：
       1. 5日>10日>20日均线
       2. 股价站上所有均线
     strategy_num: 1
  #
  # 低估值蓝筹:
  #   query: |
  #     找出低估值蓝筹股：
  #     1. 市盈率<15
  #     2. 市净率<2
  #     3. 股息率>3%
  #   strategy_num: 1


# ==================== 高级配置（一般无需修改）=====================

# LLM 配置
llm:
  temperature: 0.7
  max_tokens: 4096

# 输出配置
output:
  strategies_dir: "${SCREENER_SCRIPTS_DIR:-./screening_scripts}"  # 策略脚本输出目录
  auto_save_script: true         # 是否自动保存生成的策略脚本（true=自动保存，false=询问用户）

# Agent约束框架
harness:
  deep_thinking: True         # 是否启用深度思考模式（true=详细分析，false=快速响应）
  max_iterations: 2            # 最大迭代次数
  max_consecutive_errors: 2    # 最大连续错误次数
  max_execution_time: 300      # 最大执行时间 (秒)
  
  # Hook配置（自定义验证和质量控制）
  hooks:
    PreToolUse: []
    PostToolUse: []
    Stop:
      - hooks:
          - type: command
            command: "python hooks/quality-gate.py"

# 权限控制
permissions:
  allow:
    - "*"                      # 允许所有工具
  deny: []                     # 拒绝的工具列表

# MCP服务配置
mcp: {}
