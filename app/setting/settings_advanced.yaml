# ================================================================================
# 高级配置文件 - 一般无需修改，除非你有特殊需求
# ================================================================================
# 
# 警告：以下配置影响系统底层行为，不建议新手修改
# 如不确定某个配置的作用，请保持默认值
# ================================================================================

# ==================== LLM 配置 =================================
llm:
  temperature: 0.7
  max_tokens: 4096

# ==================== 输出配置 =================================
output:
  strategies_dir: "${SCREENER_SCRIPTS_DIR:-./screening_scripts}"  # 策略脚本输出目录
  auto_save_script: true         # 是否自动保存生成的策略脚本（true=自动保存，false=询问用户）

# ==================== Agent约束框架 ==========================
harness:
  deep_thinking: false         # 是否启用深度思考模式（true=详细分析，false=快速响应）
  max_iterations: 2           # 最大迭代次数
  max_consecutive_errors: 2    # 最大连续错误次数
  max_execution_time: 300      # 最大执行时间 (秒)
  
  # Hook配置（自定义验证和质量控制）
  hooks:
    PreToolUse: []
    PostToolUse: []
    Stop:
      - hooks:
          - type: command
            command: "python hooks/quality-gate.py"

# ==================== 权限控制 ================================
permissions:
  allow:
    - "*"                      # 允许所有工具
  deny: []                     # 拒绝的工具列表

# ==================== MCP服务配置 =============================
mcp: {}
