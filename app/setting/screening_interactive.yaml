# ================================================================================
# 交互式筛选系统配置 - 完整版
# ================================================================================
# 
# 说明：
# 1. 此配置用于交互式模式 (python app/screener.py)
# 2. 策略通过用户输入动态生成，无需预定义 templates
# 3. stock_pool.yaml 控制股票池过滤规则
# ================================================================================

# ==================== 全局配置 =============================

# 全局观察期 (交易日) - 用于所有策略生成、回测和指标计算
observation_days: 60

# ==================== 系统配置 =============================

# LLM 配置（Agent 运行必需）
llm:
  model: "${DEFAULT_MODEL:-deepseek-chat}"
  temperature: 0.7
  max_tokens: 4096

# 输出配置
output:
  strategies_dir: "${SCREENER_SCRIPTS_DIR:-./app/screening_scripts}"

# Agent 约束框架（Harness）- 三大核心组件
harness:
  max_iterations: 3                # 最大迭代次数
  max_consecutive_errors: 2        # 最大连续错误次数
  max_execution_time: 30         # 最大执行时间 (秒)
  
  # ========== 1. Hooks 钩子系统 ==========
  # 在关键节点执行自定义验证脚本
  hooks:
    # 工具调用前验证（PreToolUse）
    PreToolUse:
      - matcher: "run_screening"   # 仅对 run_screening 工具生效
        hooks:
          - type: command
            command: "python .stock_asking/hooks/tool-call-validator.py"
    
    # 工具调用后检查（PostToolUse）- 验证阈值合理性和权重完整性
    PostToolUse:
      - matcher: "run_screening"
        hooks:
          - type: command
            command: "python hooks/validate-thresholds.py"
          - type: command
            command: "python hooks/validate-confidence-weights.py"
    
    # Agent 会话结束时的质量门禁（Stop）
    Stop:
      - hooks:
          - type: command
            command: "python hooks/quality-gate.py"

# ========== 2. Rules 规则引擎 ==========
# 规则文件位于 .stock_asking/rules/*.md
# 会自动加载并注入到 System Prompt 中约束 Agent 行为
# 当前已启用的规则：
#   - quality-criteria.md    : 结果质量评估标准
#   - expression-design.md   : 表达式设计规范
#   - data-quality.md        : 数据质量要求
#   - tool-value-ranges.md   : 工具返回值范围（阈值验证依据）

# ========== 3. Permissions 权限控制 ==========
permissions:
  # 白名单模式：只允许列出的工具（支持通配符）
  allow:
    - "*"                      # 默认允许所有工具
  
  # 黑名单模式：禁止列出的工具（deny 优先级高于 allow）
  deny: []                     # 当前无禁止工具
  
  # 示例配置（取消注释以启用）：
  # allow:
  #   - "run_screening"
  #   - "get_stock_data"
  #   - "rolling_*"           # 允许所有 rolling 开头的工具
  #   - "rsi"
  #   - "macd"
  # deny:
  #   - "delete_*"            # 禁止所有删除操作
  #   - "execute_code"        # 禁止代码执行

# MCP服务配置
mcp: {}

# ==================== 已移除的配置 =============================
# 
# ❌ strategies:          - 用户通过 input() 动态输入
# ❌ strategy_num:        - 用户在对话中自然调整（"再生成一个版本"）
# 
# 注意：股票池过滤规则请编辑 stock_pool.yaml
# ================================================================================
