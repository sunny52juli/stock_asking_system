# ================================================================================
# 常用配置文件 - 新手只需修改这里
# ================================================================================
# 
# 使用说明：
# 1. 策略配置（可选）- 添加你的选股策略
# 2. 回测配置（可选）- 调整持有期
#
# LLM等高级配置请编辑 settings_advanced.yaml
# ================================================================================


observation_days: 60          # 观察期 (交易日)
# ==================== 1. 策略配置 =============================
# 在这里添加你的选股策略，Agent会自动生成筛选脚本
strategies:
  放量突破:
    query: |
      找出最近放量突破的股票：
      1. 成交量较前期放大（至少 1.5 倍）
      2. 涨幅>3%
      3. 技术形态良好
    strategy_num: 1                    # 生成几个不同版本

  # 更多策略示例：
  # 均线多头:
  #   query: |
  #     找出均线多头排列的股票：
  #     1. 5日>10日>20日均线
  #     2. 股价站上所有均线
  #   strategy_num: 1
  #   observation_period_days: 60
  #
  # 低估值蓝筹:
  #   query: |
  #     找出低估值蓝筹股：
  #     1. 市盈率<15
  #     2. 市净率<2
  #     3. 股息率>3%
  #   strategy_num: 1
  #   observation_period_days: 120


# ==================== 2. 股票池筛选 ===========================
stock_pool:
  min_list_days: 180           # 最小上市天数
  exclude_st: true             # 排除ST股票
  exclude_suspended: true      # 排除停牌股票
  industry:                    # 行业过滤列表（支持模糊匹配）
#    - '通信'
#    - '芯片'
  
  # 数据质量参数
  min_completeness_ratio: 0.8  # 最小数据完整度 (0.0-1.0)
  max_missing_days: 5          # 最大缺失天数
  min_price: 2                 # 最低价格过滤
  max_price: 1000             # 最高价格过滤
  min_amount: 100000         # 最小成交量金额（单位千元）
  min_turnover: 2            # 最小成换手率过滤


# ==================== 3. 回测配置 =============================
backtest:
  holding_periods: [5, 10, 20]  # 持有期列表 (天)
  screening_date: "20260201"    # 回测筛选日期 (YYYYMMDD格式)
  index_code: null              # 指数代码 (null=全市场, 如 "000300.SH")
