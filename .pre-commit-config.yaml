# Pre-commit 配置 - 自动化代码质量检查
# 安装: pre-commit install
# 手动运行: pre-commit run --all-files

repos:
  # 1. 基础检查
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace        # 删除行尾空格
      - id: end-of-file-fixer          # 确保文件以换行符结尾
      - id: check-yaml                 # 检查 YAML 语法
      - id: check-json                 # 检查 JSON 语法
      - id: check-added-large-files    # 检查大文件 (>500KB)
        args: ['--maxkb=500']
      - id: detect-private-key         # 检测私钥

  # 2. Python 代码格式化
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.12
        args: [--line-length=100]

  # 3. Python 代码检查
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # 4. 自定义 Hooks
  - repo: local
    hooks:
      # 敏感信息检测
      - id: no-secrets
        name: 🔒 敏感信息检测
        entry: python .stock_asking/hooks/no-secrets.py
        language: system
        types: [python, yaml, json]
        stages: [pre-commit]
      
      # 代码质量检查
      - id: lint-check
        name: 🔍 代码质量检查
        entry: python .stock_asking/hooks/lint-check.py
        language: system
        types: [python]
        stages: [pre-commit]
        pass_filenames: true
      
      # 测试门禁 (可选，仅在 commit 前运行关键测试)
      - id: test-gate
        name: 🧪 测试门禁
        entry: python .stock_asking/hooks/test-gate.py
        language: system
        stages: [pre-commit]
        always_run: true
        pass_filenames: false

# 排除的文件/目录
exclude: |
  (?x)^(
    .*\.md$|                    # Markdown 文件
    docs/.*|                    # 文档目录
    \.env$|                     # 环境变量文件
    data_cache/.*|              # 数据缓存
    screening_scripts/.*|       # 生成的策略脚本
    factor_backtest_system/factor_scripts/.*|
    stock_asking_system/asking_scripts/.*
  )$
